services:
  - type: web
    name: budget-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: DB_PATH
        value: budget.db
    disk:
      name: budget-db
      mountPath: /data
      sizeGB: 1
